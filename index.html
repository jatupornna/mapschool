        const map = L.map('map').setView([14.85, 105.05], 11);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // ฟังก์ชันสร้าง Marker พร้อม Popup
       function loadMarkers() {
    schools.forEach(school => {
        L.marker([school.lat, school.lng])
         .addTo(map)
         .bindPopup("<b>" + school.name + "</b><br>สังกัด: " + school.district); // แสดงชื่อและอำเภอ
    });
}

        function getOptions() {
            return schools.map(s => `<option value="${s.lat},${s.lng}">${s.name}</option>`).join('');
        }

        function addDestination() {
            const container = document.getElementById('destinations');
            const div = document.createElement('div');
            div.className = 'waypoint-row';
            div.innerHTML = `จุดหมาย: <select class="point-select">${getOptions()}</select> <button onclick="this.parentElement.remove()">ลบ</button>`;
            container.appendChild(div);
        }

        let routingControl;
 function calculateRoute() {
    const selects = document.querySelectorAll('.point-select');
    const waypoints = Array.from(selects).map(s => {
        const coords = s.value.split(',');
        const lat = parseFloat(coords[0].trim());
        const lng = parseFloat(coords[1].trim());
        return L.latLng(lat, lng);
    });

    if (waypoints.length < 2) {
        alert("กรุณาเพิ่มจุดหมายปลายทางอย่างน้อย 1 จุดครับ");
        return;
    }

    if (routingControl) {
        map.removeControl(routingControl);
    }

    routingControl = L.Routing.control({
        waypoints: waypoints,
        routeWhileDragging: true,
        // ใช้ Router พื้นฐานของ Leaflet Routing Machine ที่จัดการ OSRM ให้เอง
        router: L.Routing.osrmv1({
            serviceUrl: 'https://router.project-osrm.org/route/v1',
            profile: 'driving'
        }),
        language: 'th'
    }).addTo(map);

    // แก้ไขปัญหาถ้าเส้นทางไม่ยอมโหลด ให้สั่งให้มันลองคำนวณใหม่
    routingControl.on('routingerror', function(e) {
        console.error("เกิดข้อผิดพลาดในการคำนวณเส้นทาง:", e);
        alert("ขออภัย ระบบคำนวณเส้นทางไม่ได้ในขณะนี้ (อาจเป็นเพราะ OSRM Demo Server ปฏิเสธการเชื่อมต่อ)");
    });
}
// อย่าลืมเรียกใช้ฟังก์ชันโหลดมาร์เกอร์เพื่อให้แผนที่แสดงโรงเรียนตั้งแต่ตอนเริ่ม
loadMarkers();
